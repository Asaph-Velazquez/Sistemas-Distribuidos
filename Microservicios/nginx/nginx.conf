worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream auth-service {
        server auth-service:8080;
    }

    upstream profile-service {
        server profile-service:8080;
    }

    upstream matchmaking-service {
        server matchmaking-service:8080;
    }

    upstream game-engine-service {
        server game-engine-service:8080;
    }

    upstream stats-service {
        server stats-service:8080;
    }

    server {
        listen 80;

        # Auth Service
        location /auth/ {
            proxy_pass http://auth-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Profile Service
        location /profile/ {
            proxy_pass http://profile-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Matchmaking Service
        location /games/ {
            proxy_pass http://matchmaking-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Game Engine Service (REST)
        location /game/ {
            proxy_pass http://game-engine-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Game Engine WebSocket
        location /game/ws/ {
            proxy_pass http://game-engine-service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Stats Service
        location /stats/ {
            proxy_pass http://stats-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}