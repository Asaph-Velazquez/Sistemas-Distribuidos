services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: ../Dockerfile.base
    container_name: ros-auth
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET:-realmOfShadowsSecretKeyForJWTTokenGeneration2024}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - JAVA_OPTS=${JAVA_OPTS:-}
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-8081}:8080"
    networks:
      - game-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  profile-service:
    build:
      context: ./profile-service
      dockerfile: ../Dockerfile.base
    container_name: ros-profile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=${JAVA_OPTS:-}
    restart: unless-stopped
    ports:
      - "${PROFILE_PORT:-8082}:8080"
    networks:
      - game-network
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/profile/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  matchmaking-service:
    build:
      context: ./matchmaking-service
      dockerfile: ../Dockerfile.base
    container_name: ros-matchmaking
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=${JAVA_OPTS:-}
    restart: unless-stopped
    ports:
      - "${MATCHMAKING_PORT:-8083}:8080"
    networks:
      - game-network
    depends_on:
      profile-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/games/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  game-engine-service:
    build:
      context: ./game-engine-service
      dockerfile: ../Dockerfile.base
    container_name: ros-game-engine
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=${JAVA_OPTS:-}
    restart: unless-stopped
    ports:
      - "${GAME_ENGINE_PORT:-8084}:8080"
    networks:
      - game-network
    depends_on:
      matchmaking-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/game/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  stats-service:
    build:
      context: ./stats-service
      dockerfile: ../Dockerfile.base
    container_name: ros-stats
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=${JAVA_OPTS:-}
    restart: unless-stopped
    ports:
      - "${STATS_PORT:-8085}:8080"
    networks:
      - game-network
    depends_on:
      game-engine-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/stats/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx-gateway:
    image: nginx:alpine
    container_name: ros-nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - game-network
    depends_on:
      auth-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      matchmaking-service:
        condition: service_healthy
      game-engine-service:
        condition: service_healthy
      stats-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: ros-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - game-network
    depends_on:
      nginx-gateway:
        condition: service_healthy

networks:
  game-network:
    driver: bridge
