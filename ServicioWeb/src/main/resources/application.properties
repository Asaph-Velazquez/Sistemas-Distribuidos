# ============================================================
# Configuración Spring Boot - Servicio Web de Juego
# ============================================================

# Nombre de la aplicación
spring.application.name=ServicioWeb

# ============================================================
# Configuración del Servidor
# ============================================================

# Puerto donde se ejecutará el servidor
server.port=8080

# Contexto de la aplicación (raíz del servidor)
server.servlet.context-path=/

# ============================================================
# Configuración de Logging
# ============================================================

# Nivel de log raíz (ERROR, WARN, INFO, DEBUG, TRACE)
logging.level.root=INFO

# Nivel de log específico para el paquete del juego (más detallado)
logging.level.backend=DEBUG

# Patrón de log personalizado
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================
# Configuración de CORS
# ============================================================

# Habilitar CORS para desarrollo local
# Permite que clientes HTML locales se conecten al servidor
server.servlet.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080,http://127.0.0.1:3000
server.servlet.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
server.servlet.cors.allowed-headers=*
server.servlet.cors.allow-credentials=true
server.servlet.cors.max-age=3600

# ============================================================
# Configuración de Resources Estáticos
# ============================================================

# Recursos estáticos desde static/
spring.web.resources.static-locations=classpath:/static/

# Caché de recursos estáticos (desarrollo: 0)
spring.web.resources.cache.period=0
